{% extends 'core/base.html' %}
{% block content %}
<div style="text-align: center; margin-top: 50px;">
    <h2>"{{ object.title }}" 일기를 정말 삭제하시겠습니까?</h2>
    <p style="color: #dc3545;">이 작업은 되돌릴 수 없습니다.</p>
    <form method="POST" style="margin-top: 20px;">
        {% csrf_token %}
        <a href="{% url 'diary:diary_detail' object.pk %}" style="padding: 10px 20px; text-decoration: none; border: 1px solid #ccc; border-radius: 4px; margin-right: 10px; color: #333;">취소</a>
        <button type="submit" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">네, 삭제합니다</button>
    </form>
</div>
{% endblock %}
